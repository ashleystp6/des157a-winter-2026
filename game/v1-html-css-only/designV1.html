<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game On V1</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Rye&display=swap" rel="stylesheet"> 
</head>
<body>
    
    <header>
        <h1>Arggg you ready pirates?</h1>
    </header>

    <main>
        <div id="top">
            <div id="rules">
                <h2>Rules:</h2>
                <p>
                    Roll the dice and see what images you get. You need a score of 15 to win! <br>
                    Items that add to score:
                    <ul>
                        <li>+ gold coins</li>
                        <li>+ treasure</li>
                        <li>+ jewel</li>
                    </ul>
                    Items that subtract from score:
                    <ul>
                        <li>- cannon</li>
                        <li>- sword</li>
                        <li>- shark</li>
                    </ul>
                </p>
                <img src="images/ship2.jpg" height="300" width="300" alt="ship">
            </div>

            <div id="dice">
                <img src="images/gold.jpg" height="250" width="250" alt="gold">
                <img src="images/jewel.jpg" height="250" width="250" alt="jewel">
            </div>
        </div>

        

        <button id="button">Roll!</button>

        <div id="names">
            <h3>Pirate 1</h3>
            <h3>Pirate 2</h3>
        </div>

        <div id="score">
            <h3>Score</h3>
            <h3>Score</h3>
        </div>
    </main>
</body>
</html>
